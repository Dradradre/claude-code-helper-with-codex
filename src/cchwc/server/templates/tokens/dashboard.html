{% extends "base.html" %}
{% block title %}Tokens — cchwc{% endblock %}
{% block content %}

<div class="mb-8">
  <h1 class="text-2xl font-semibold text-gray-900">Token Usage</h1>
  <p class="text-sm text-gray-500 mt-1">에이전트별 토큰 사용 현황</p>
</div>

<!-- Summary cards (JS로 채움) -->
<div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8"></div>

<!-- Charts -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <h3 class="text-sm font-semibold text-gray-700 mb-4">일별 토큰 (최근 30일)</h3>
    <canvas id="daily-chart"></canvas>
  </div>
  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <h3 class="text-sm font-semibold text-gray-700 mb-4">모델별 사용량</h3>
    <canvas id="model-chart"></canvas>
  </div>
</div>

<!-- Project table -->
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
  <div class="px-5 py-4 border-b border-gray-100">
    <h3 class="text-sm font-semibold text-gray-700">프로젝트별 토큰</h3>
  </div>
  <div id="project-table" class="p-2"></div>
</div>

<script>
const fmt = n => (n||0).toLocaleString();

async function load() {
  const [sum, daily, model, project] = await Promise.all([
    fetch('/api/tokens/summary').then(r=>r.json()),
    fetch('/api/tokens/daily?days=30').then(r=>r.json()),
    fetch('/api/tokens/by-model').then(r=>r.json()),
    fetch('/api/tokens/by-project').then(r=>r.json()),
  ]);

  document.getElementById('summary').innerHTML = [
    ['입력 토큰', sum.total_input_tokens],
    ['출력 토큰', sum.total_output_tokens],
    ['캐시 읽기', sum.total_cache_read_tokens],
    ['총 세션', sum.total_sessions],
  ].map(([label, val]) => `
    <div class="bg-white rounded-xl border border-gray-200 px-4 py-3">
      <p class="text-xs text-gray-500 mb-0.5">${label}</p>
      <p class="text-xl font-semibold text-gray-900">${fmt(val)}</p>
    </div>`).join('');

  const dates = [...new Set(daily.map(d=>d.date))].sort();
  const claude = dates.map(d => { const r=daily.find(x=>x.date===d&&x.agent_type==='claude'); return r?(r.input_tokens+r.output_tokens):0; });
  const codex  = dates.map(d => { const r=daily.find(x=>x.date===d&&x.agent_type==='codex');  return r?(r.input_tokens+r.output_tokens):0; });

  const chartDefaults = {
    responsive: true,
    plugins: { legend: { labels: { font: { family: "'PretendardVariable', sans-serif", size: 12 }, color: '#374151' } } },
    scales: {
      x: { stacked: true, ticks: { color: '#9ca3af', font: { size: 11 } }, grid: { color: '#f3f4f6' } },
      y: { stacked: true, ticks: { color: '#9ca3af', font: { size: 11 } }, grid: { color: '#f3f4f6' } }
    }
  };

  new Chart(document.getElementById('daily-chart'), {
    type: 'bar',
    data: { labels: dates.map(d=>d.slice(5)), datasets: [
      { label: 'Claude', data: claude, backgroundColor: '#7c3aed', borderRadius: 2 },
      { label: 'Codex',  data: codex,  backgroundColor: '#059669', borderRadius: 2 },
    ]},
    options: chartDefaults
  });

  if (model.length > 0) {
    const colors = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#0891b2'];
    new Chart(document.getElementById('model-chart'), {
      type: 'doughnut',
      data: {
        labels: model.map(m=>m.model||'unknown'),
        datasets: [{ data: model.map(m=>m.input_tokens+m.output_tokens), backgroundColor: colors, borderWidth: 0 }]
      },
      options: { responsive: true, plugins: { legend: { labels: { color: '#374151', font: { family: "'PretendardVariable', sans-serif", size: 12 } } } } }
    });
  }

  const rows = project.map(p => `
    <div class="flex items-center justify-between px-3 py-2.5 hover:bg-gray-50 rounded-lg">
      <div>
        <p class="text-sm font-medium text-gray-900">${p.project}</p>
        <p class="text-xs text-gray-400 font-mono">${p.cwd}</p>
      </div>
      <div class="flex gap-6 text-right">
        <div><p class="text-xs text-gray-500">입력</p><p class="text-sm font-medium">${fmt(p.input_tokens)}</p></div>
        <div><p class="text-xs text-gray-500">출력</p><p class="text-sm font-medium">${fmt(p.output_tokens)}</p></div>
        <div><p class="text-xs text-gray-500">세션</p><p class="text-sm font-medium">${p.session_count}</p></div>
      </div>
    </div>`).join('');
  document.getElementById('project-table').innerHTML = rows || '<p class="p-4 text-sm text-gray-400">데이터 없음</p>';
}

load();
</script>
{% endblock %}
