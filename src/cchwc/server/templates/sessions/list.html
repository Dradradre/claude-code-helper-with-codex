{% extends "base.html" %}
{% block title %}Sessions — cchwc{% endblock %}
{% block content %}

<div class="mb-6 flex items-center justify-between gap-4">
  <div>
    <h1 class="text-2xl font-semibold text-gray-900">Sessions</h1>
    <p class="text-sm text-gray-500 mt-1">인덱싱된 모든 세션</p>
  </div>
  <div class="flex items-center gap-2">
    <!-- 프로젝트 필터 -->
    <select
      id="project-filter"
      name="project_id"
      class="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 max-w-[220px] truncate"
      hx-get="/sessions/partial"
      hx-trigger="change"
      hx-target="#session-table-body"
      hx-include="#project-filter,#agent-filter,#search-q"
    >
      <option value="">전체 프로젝트</option>
      {% for p in projects %}
      <option value="{{ p.id }}" title="{{ p.cwd }}">{{ p.display_name }}</option>
      {% endfor %}
    </select>
    <!-- 에이전트 필터 -->
    <select
      id="agent-filter"
      name="agent_type"
      class="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
      hx-get="/sessions/partial"
      hx-trigger="change"
      hx-target="#session-table-body"
      hx-include="#project-filter,#agent-filter,#search-q"
    >
      <option value="">전체</option>
      <option value="claude">Claude</option>
      <option value="codex">Codex</option>
    </select>
    <!-- 검색 -->
    <input
      type="text"
      id="search-q"
      name="q"
      placeholder="메시지 검색…"
      class="w-52 px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
      hx-get="/sessions/partial"
      hx-trigger="keyup changed delay:400ms"
      hx-target="#session-table-body"
      hx-include="#project-filter,#agent-filter,#search-q"
    >
  </div>
</div>

<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
  <table class="w-full">
    <thead>
      <tr class="bg-gray-50 border-b border-gray-100">
        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500">에이전트</th>
        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500">프로젝트 / 세션 ID</th>
        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500">시작</th>
        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500">마지막 활동</th>
        <th class="px-5 py-3 text-right text-xs font-medium text-gray-500">메시지</th>
        <th class="px-5 py-3 text-right text-xs font-medium text-gray-500">입력 토큰</th>
        <th class="px-5 py-3 text-right text-xs font-medium text-gray-500">출력 토큰</th>
      </tr>
    </thead>
    <tbody
      id="session-table-body"
      class="divide-y divide-gray-100"
      hx-get="/sessions/partial"
      hx-trigger="load"
      hx-indicator="#loading"
    >
      <tr id="loading">
        <td colspan="7" class="px-5 py-10 text-center text-sm text-gray-400">불러오는 중…</td>
      </tr>
    </tbody>
  </table>
</div>

{% endblock %}
