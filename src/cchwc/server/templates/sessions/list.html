{% extends "base.html" %}
{% block title %}Sessions — cchwc{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Sessions</h1>
    <div class="flex gap-2">
        <input type="text" id="search-input" placeholder="Search messages..."
               class="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm"
               hx-get="/api/search" hx-trigger="keyup changed delay:300ms" hx-target="#search-results"
               hx-include="this" name="q">
        <select id="agent-filter" class="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm"
                hx-get="/api/sessions" hx-trigger="change" hx-target="#session-list" name="agent_type">
            <option value="">All Agents</option>
            <option value="claude">Claude</option>
            <option value="codex">Codex</option>
        </select>
    </div>
</div>

<div id="search-results" class="mb-4"></div>

<div id="session-list"
     hx-get="/api/sessions" hx-trigger="load" hx-target="this">
    <div class="text-gray-500">Loading sessions...</div>
</div>
{% endblock %}
