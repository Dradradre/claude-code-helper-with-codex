{% if not runs %}
<div class="text-sm text-gray-400 py-6 text-center">아직 실행 기록이 없습니다.</div>
{% else %}
<div class="divide-y divide-gray-100">
  {% for run in runs %}
  {% set duration = duration_sec(run.started_at, run.finished_at) %}
  <button type="button" onclick="loadRunDetail({{ run.id }})"
    class="w-full text-left px-4 py-3 hover:bg-gray-50 transition-colors">
    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-xs font-semibold text-gray-900">#{{ run.id }}</span>
          <span class="text-xs px-2 py-0.5 rounded-full border bg-gray-50 text-gray-600 border-gray-200">
            {{ mode_label(run.mode) }}
          </span>
          <span class="text-xs px-2 py-0.5 rounded-full border {{ status_badge_class(run.status) }}">
            {{ status_label(run.status) }}
          </span>
          {% if duration is not none %}
          <span class="text-xs text-gray-400">{{ "%.1f"|format(duration) }}s</span>
          {% endif %}
        </div>
        <p class="mt-1 text-sm text-gray-700 truncate">{{ compact_text(run.user_prompt, 110) }}</p>
        {% if run.result_summary %}
        <p class="mt-0.5 text-xs text-gray-400 truncate">{{ compact_text(run.result_summary, 120) }}</p>
        {% endif %}
      </div>
      <div class="flex-shrink-0 text-right">
        <p class="text-xs text-gray-500">{{ run.started_at.strftime("%m-%d %H:%M") }}</p>
        <p class="text-xs text-gray-400">{{ "{:,}".format(run.total_tokens or 0) }} tokens</p>
      </div>
    </div>
  </button>
  {% endfor %}
</div>
{% endif %}
