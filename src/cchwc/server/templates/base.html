<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}cchwc{% endblock %}</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'PretendardVariable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .badge-claude  { background: #ede9fe; color: #6d28d9; }
    .badge-codex   { background: #d1fae5; color: #065f46; }
    .role-user        { border-left: 3px solid #2563eb; }
    .role-assistant   { border-left: 3px solid #059669; }
    .role-tool_use    { border-left: 3px solid #d97706; }
    .role-tool_result { border-left: 3px solid #9ca3af; }
    .role-system      { border-left: 3px solid #7c3aed; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-gray-900 text-sm">
        <span class="w-6 h-6 rounded bg-gray-900 text-white flex items-center justify-center text-xs font-bold">cc</span>
        cchwc
      </a>
      <nav class="flex items-center gap-1">
        <a href="/"           class="px-3 py-1.5 rounded-md text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Dashboard</a>
        <a href="/sessions"   class="px-3 py-1.5 rounded-md text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Sessions</a>
        <a href="/tokens"     class="px-3 py-1.5 rounded-md text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Tokens</a>
        <a href="/orchestrate" class="px-3 py-1.5 rounded-md text-sm text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Orchestrate</a>
        <a href="/docs" target="_blank" class="px-3 py-1.5 rounded-md text-sm text-gray-400 hover:bg-gray-100 hover:text-gray-900 transition-colors">API</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
